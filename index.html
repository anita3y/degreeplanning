<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anita Yan — Graduation Planner</title>
<style>
  :root{
    --bg:#ffffff;
    --surface:#ffffff;
    --surface-2:#fafafa;
    --border:#e5e7eb;
    --border-soft:#eee;
    --text:#16181d;
    --text-soft:#8a8f98;
    --text-faint:#b3b7bf;

    --core:#4361EE;
    --major:#2A9D8F;
    --ima-elective:#E9A23B;
    --las-core:#E63946;
    --las-elective:#8E5DB8;
    --free:#E91E8C;

    --danger:#c0392b;
    --danger-bg:#fdeeec;
    --warn:#b7791f;
    --warn-bg:#fdf6e3;
    --ok:#2A9D8F;
    --ok-bg:#e9f7f5;
    --track-bg:#e3e3e3;

    --radius:10px;
    --radius-sm:6px;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.04);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    font-size:14px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{margin:0; font-weight:600; letter-spacing:-0.01em;}
  #app{max-width:1240px;margin:0 auto;padding:32px 28px 90px;}

  #noSaveBanner{
    background:var(--warn-bg); color:var(--warn); border:1px solid #e9d9a8; border-radius:8px;
    padding:11px 14px; font-size:12.5px; margin-bottom:18px; line-height:1.5;
  }
  #noSaveBanner b{font-weight:700;}
  #noSaveBanner .btn{margin-top:8px;}

  /* ---------- MASTHEAD ---------- */
  .masthead{
    display:flex; justify-content:space-between; align-items:flex-start; gap:24px;
    padding-bottom:24px; margin-bottom:24px; border-bottom:1px solid var(--border);
  }
  .masthead h1{font-size:22px;}
  .masthead .program{font-size:13px; color:var(--text-soft); margin-top:4px;}
  .masthead .stats{display:flex; gap:32px; align-items:flex-start;}
  .stat-block{text-align:right; min-width:120px;}
  .stat-block .num{font-size:24px; font-weight:600; letter-spacing:-0.02em;}
  .stat-block .num small{font-size:14px; font-weight:400; color:var(--text-soft);}
  .stat-block .label{font-size:11.5px; color:var(--text-soft); margin-top:2px;}
  .overall-bar{width:180px; height:6px; background:var(--track-bg); border-radius:4px; margin-top:8px; overflow:hidden; position:relative;}
  .overall-bar .m-fill{height:100%; background:var(--c); position:absolute; left:0; top:0; border-radius:4px;}
  .overall-bar .m-fill.inprog{opacity:.45;}
  .overall-bar .m-fill.planned{opacity:.22;}
  .overall-extra{font-size:10.5px; color:var(--text-faint); margin-top:4px; text-align:right;}

  .sem-extra{font-size:10.5px; color:var(--text-faint); margin-top:4px; text-align:right;}

  /* ---------- REQUIREMENT GROUPS ---------- */
  .meters{
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:10px; align-items:start;
  }
  .req-tile{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden;
  }
  .req-tile > summary, .req-tile > .tile-head{
    cursor:pointer; list-style:none; padding:13px 14px; display:flex; align-items:center; gap:10px;
  }
  .req-tile > summary::-webkit-details-marker{display:none;}
  .req-tile > summary::marker{content:"";}
  .req-tile .g-dot{width:8px; height:8px; border-radius:50%; background:var(--c); flex-shrink:0;}
  .req-tile .g-info{flex:1; min-width:0;}
  .req-tile .g-label{font-size:12.5px; font-weight:600; color:var(--text);}
  .req-tile .g-sub{font-size:11px; color:var(--text-soft); margin-top:1px;}
  .req-tile .g-nums{font-size:13px; font-weight:600; color:var(--text); white-space:nowrap;}
  .req-tile .g-nums small{font-weight:400; color:var(--text-soft);}
  .req-tile .chevron{color:var(--text-faint); transition:transform .15s; flex-shrink:0;}
  .req-tile[open] .chevron{transform:rotate(180deg);}
  .req-tile .chevron-spacer{width:14px; height:14px; flex-shrink:0;}
  .req-tile .g-track{height:5px; background:var(--track-bg); border-radius:3px; margin-top:8px; overflow:hidden; position:relative;}
  .req-tile .g-track .m-fill{height:100%; background:var(--c); position:absolute; left:0; top:0; border-radius:3px;}
  .req-tile .g-track .m-fill.inprog{background:var(--c); opacity:.45;}
  .req-tile .g-track .m-fill.planned{background:var(--c); opacity:.22;}
  .req-tile .g-planned{font-size:10.5px; color:var(--text-faint); margin-top:5px;}

  .group-body{padding:12px 14px 14px; border-top:1px solid var(--border-soft); display:flex; flex-direction:column; gap:10px;}
  .child-meter{border:1px solid var(--border-soft); border-radius:8px; padding:10px 11px; background:var(--surface-2);}
  .child-meter .m-label{font-size:11.5px; color:var(--text-soft); margin-bottom:6px; display:flex; align-items:center; gap:6px;}
  .child-meter .m-dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--c); flex-shrink:0;}
  .child-meter .m-nums{display:flex; justify-content:space-between; align-items:baseline;}
  .child-meter .m-nums .have{font-size:15px; font-weight:600;}
  .child-meter .m-nums .need{font-size:11.5px; color:var(--text-soft);}
  .child-meter .m-track{height:4px; background:var(--track-bg); border-radius:3px; position:relative; overflow:hidden; margin-top:6px;}
  .child-meter .m-fill{height:100%; background:var(--c); position:absolute; left:0; top:0; border-radius:3px;}
  .child-meter .m-fill.inprog{background:var(--c); opacity:.45;}
  .child-meter .m-fill.planned{background:var(--c); opacity:.22;}
  .child-meter .m-extra{font-size:10px; color:var(--text-faint); margin-top:5px;}
  .child-meter .area-details{
    margin-top:8px; border:none; border-top:1px dashed var(--border);
    border-radius:0; background:transparent;
  }
  /* ---------- AREA SUMMARY (nested under its parent meter) ---------- */
  .area-details{overflow:hidden;}
  .area-details > summary{
    cursor:pointer; list-style:none; display:flex; align-items:center; gap:10px;
    padding:8px 0 2px; font-size:11px;
  }
  .area-details > summary::-webkit-details-marker{display:none;}
  .area-details .as-planned{color:var(--text-faint); font-size:10.5px; flex:1;}
  .area-details .as-toggle{display:flex; align-items:center; gap:4px; color:var(--text-soft); font-size:10.5px; flex-shrink:0; margin-left:auto;}
  .area-details .chevron-sm{transition:transform .15s; flex-shrink:0;}
  .area-details[open] .chevron-sm{transform:rotate(180deg);}
  .area-body{padding:0 0 2px;}
  .area-details .bp-sub{font-size:10.5px; color:var(--text-faint); margin:0 0 6px; padding-top:6px;}
  .area-item{
    border:1px solid var(--border-soft); border-radius:7px; background:#fff;
    margin-bottom:6px; overflow:hidden;
  }
  .area-item:last-child{margin-bottom:0;}
  .area-item > summary{
    cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px;
    padding:8px 9px; font-size:11.5px;
  }
  .area-item > summary::-webkit-details-marker{display:none;}
  .area-item .area-name{flex:1; min-width:0; font-weight:500;}
  .area-item .area-hint{display:block; font-size:10px; color:var(--text-faint); font-weight:400; margin-top:1px;}
  .area-item .chevron-sm{color:var(--text-faint); flex-shrink:0; transition:transform .15s;}
  .area-item[open] > summary .chevron-sm{transform:rotate(180deg);}
  .area-track{width:48px; height:4px; background:var(--border); border-radius:3px; overflow:hidden; flex-shrink:0;}
  .area-track-fill{height:100%; border-radius:3px;}
  .area-credits{font-size:10.5px; width:38px; text-align:right; flex-shrink:0; color:var(--text-soft);}
  .area-ok{color:var(--ok);}
  .area-short{color:var(--warn);}
  .area-course-list{padding:0 9px 8px; display:flex; flex-direction:column; gap:5px;}
  .area-course-list.flush{padding:0 0 2px;}
  .area-course{
    display:flex; justify-content:space-between; gap:8px; align-items:baseline;
    padding:6px 8px 6px 10px; border-radius:6px; background:var(--surface-2); font-size:11px;
    cursor:pointer; border:1px solid transparent; border-left:3px solid var(--c, var(--text-faint));
    transition:background .12s, border-color .12s;
  }
  .group-body > .area-course,
  .child-meter .area-details .area-course{background:#fff;}
  .group-body > .area-course{border:1px solid var(--border-soft); border-left:3px solid var(--c, var(--text-faint));}
  .area-course:hover{background:#f2f3f5; border-color:var(--border); border-left-color:var(--c, var(--text-faint));}
  .area-course .ac-name{color:var(--text); line-height:1.3; min-width:0;}
  .area-course .ac-meta{color:var(--text-faint); font-size:10px; white-space:nowrap; flex-shrink:0;}
  .area-empty{font-size:10.5px; color:var(--text-faint); padding:2px 9px 8px;}
  .area-empty.flush{padding:2px 0 4px;}
  .area-add{
    width:100%; background:none; border:1px dashed var(--border); border-radius:6px;
    padding:7px 8px; margin-top:2px; text-align:left; font-size:11.5px;
    color:var(--text-soft); cursor:pointer; font-family:inherit;
  }
  .area-add:hover{color:var(--text); border-color:var(--text-faint); background:#fff;}
  .area-course-list .area-add,
  .area-item .area-add{margin:0 9px 8px;}
  .area-course-list.flush .area-add,
  .group-body > .area-add{margin:2px 0 0;}

  /* ---------- TOOLBAR ---------- */
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .toggle-group{display:flex; border:1px solid var(--border); border-radius:8px; padding:2px; background:var(--surface-2);}
  .toggle-group button{
    background:transparent; border:none; padding:6px 14px; font-size:13px;
    cursor:pointer; font-family:inherit; color:var(--text-soft); border-radius:6px;
  }
  .toggle-group button.active{background:#fff; color:var(--text); box-shadow:var(--shadow);}
  .btn{
    background:var(--text); color:#fff; border:none; padding:8px 14px; font-size:13px;
    cursor:pointer; font-family:inherit; border-radius:7px; font-weight:500;
  }
  .btn.ghost{background:transparent; color:var(--text-soft); border:1px solid var(--border);}
  .btn.small{padding:4px 9px; font-size:12px;}
  .btn:hover{opacity:.88;}
  .btn.ghost:hover{color:var(--text); border-color:var(--text-faint);}
  .actions-right{display:flex; gap:8px;}

  /* ---------- SEMESTER GRID ---------- */
  .sem-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(255px,1fr)); gap:14px;
    align-items:start;
  }
  .sem-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    display:flex; flex-direction:column; transition:box-shadow .15s, border-color .15s, opacity .12s;
  }
  .sem-card.drag-over{border-color:var(--text); box-shadow:0 0 0 3px rgba(22,24,29,.06);}
  .sem-card.term-dragging{opacity:.4;}
  .sem-card.term-drag-over{border-color:var(--text); box-shadow:0 0 0 3px rgba(22,24,29,.08);}
  .sem-card.collapsed{
    height:fit-content; align-self:start;
  }
  .sem-card.collapsed .sem-head{
    border-bottom:none;
    padding:12px 12px;
    align-items:center;
  }
  .sem-card.collapsed .sem-body{display:none;}
  .sem-head{
    display:flex; justify-content:space-between; align-items:flex-start; gap:8px;
    padding:14px 14px 10px; border-bottom:1px solid var(--border-soft); cursor:grab;
    user-select:none;
  }
  .sem-head:active{cursor:grabbing;}
  .sem-head .sem-grip{
    color:var(--text-faint); font-size:14px; line-height:1; letter-spacing:-1px;
    user-select:none; margin-top:2px; flex-shrink:0;
  }
  .sem-card.collapsed .sem-grip{margin-top:0;}
  .sem-head h3{font-size:14.5px; font-weight:600;}
  .sem-head .sem-type{font-size:11px; color:var(--text-soft); margin-top:2px;}
  .sem-cred{text-align:right;}
  .sem-cred .n{font-size:17px; font-weight:600;}
  .sem-toggle{
    width:22px; height:22px; flex-shrink:0; margin-top:0;
    display:inline-flex; align-items:center; justify-content:center;
    background:none; border:none; border-radius:0; padding:0;
    color:var(--text-faint); cursor:pointer; font-family:inherit;
    transition:color .12s, transform .15s;
  }
  .sem-toggle:hover{color:var(--text);}
  .sem-toggle svg{display:block;}
  .sem-card.collapsed .sem-toggle{transform:rotate(-90deg);}

  .course-list{list-style:none; margin:0; padding:10px 10px 6px; flex:1; min-height:24px;}
  .course-row{
    display:flex; align-items:flex-start; gap:8px; padding:8px 9px 8px 10px; border-radius:7px;
    background:var(--surface-2); margin-bottom:6px; cursor:grab; border:1px solid transparent;
    border-left:3px solid var(--c, var(--text-faint));
    transition:background .12s, border-color .12s;
  }
  .course-row:hover{background:#f2f3f5; border-color:var(--border); border-left-color:var(--c, var(--text-faint));}
  .course-row.dragging{opacity:.4;}
  .course-row.drop-before{box-shadow:inset 0 2px 0 var(--text);}
  .course-row.drop-after{box-shadow:inset 0 -2px 0 var(--text);}
  .course-row .cr-dot{display:none;}
  .course-row .cr-body{flex:1; min-width:0;}
  .course-row .cr-code{font-size:10.5px; color:var(--text-faint);}
  .course-row .cr-name{font-size:12.5px; line-height:1.3;}
  .course-row .cr-status{font-size:10px; color:var(--text-soft); margin-top:2px;}
  .course-row.planned .cr-status{color:var(--text-faint);}
  .course-row .cr-credits{font-size:13px; font-weight:600; white-space:nowrap; color:var(--text-soft);}

  .sem-add{width:100%; background:none; border:none; border-top:1px solid var(--border-soft); padding:9px 14px;
    text-align:left; font-size:12.5px; color:var(--text-soft); cursor:pointer; font-family:inherit; border-radius:0 0 var(--radius) var(--radius);}
  .sem-add:hover{color:var(--text); background:var(--surface-2);}
  .sem-remove,.sem-edit{
    background:none; border:none; color:var(--text-faint); cursor:pointer;
    font-size:16px; line-height:1; padding:2px 4px; font-family:inherit;
  }
  .sem-edit{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px; height:22px; padding:0;
  }
  .sem-edit svg{display:block;}
  .sem-edit:hover{color:var(--text);}
  .sem-remove:hover{color:var(--danger);}
  .sem-title-btn{
    background:none; border:none; padding:0; margin:0; text-align:left; cursor:pointer;
    font:inherit; color:inherit; width:100%;
  }
  .sem-title-btn:hover h3{text-decoration:underline; text-decoration-color:var(--text-faint);}

  .add-sem-card{
    border:1px dashed var(--border); border-radius:var(--radius);
    display:flex; align-items:center; justify-content:center;
    min-height:120px; cursor:pointer; color:var(--text-soft); font-size:13px; background:transparent;
  }
  .add-sem-card:hover{color:var(--text); border-color:var(--text-faint); background:var(--surface-2);}

  /* ---------- SCHEDULE VIEW ---------- */
  #scheduleView .sched-controls{display:flex; gap:10px; align-items:center; margin-bottom:10px;}
  #scheduleView select{font-size:13px; border:1px solid var(--border); border-radius:6px; padding:6px 8px; font-family:inherit;}
  .sched-grid{
    display:grid; grid-template-columns:40px repeat(5,1fr); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; background:var(--surface);
  }
  .sched-grid .hcell{border-bottom:1px solid var(--border-soft); border-right:1px solid var(--border-soft); padding:5px 2px; font-size:10px; text-align:center; color:var(--text-soft); font-weight:600;}
  .sched-grid .tcell{border-right:1px solid var(--border-soft); border-bottom:1px solid var(--border-soft); font-size:9px; color:var(--text-faint); text-align:right; padding:0 4px; line-height:1.1;}
  .sched-col{position:relative; border-right:1px solid var(--border-soft); overflow:hidden;}
  .sched-block{
    position:absolute; left:2px; right:2px; background:#fff;
    padding:2px 4px 2px 6px; font-size:10px; overflow:hidden; border-radius:3px;
    box-shadow:none; border:1px solid var(--border-soft); border-left:3px solid var(--c, #999); cursor:pointer;
  }
  .sched-block .b-name{font-weight:600; font-size:10px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sched-block .b-code{font-size:8.5px; color:var(--text-soft); white-space:nowrap;}
  .no-schedule-note{font-size:13px; color:var(--text-soft); margin-top:16px;}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed; inset:0; background:rgba(20,22,27,.35); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:#fff; border:1px solid var(--border); border-radius:var(--radius); max-width:440px; width:100%; max-height:90vh; overflow-y:auto; padding:22px 24px; box-shadow:0 10px 40px rgba(16,24,40,.15);}
  .modal h2{font-size:16px; margin-bottom:16px;}
  .field{margin-bottom:13px;}
  .field label{display:block; font-size:11.5px; color:var(--text-soft); margin-bottom:4px; font-weight:500;}
  .field input[type=text], .field input[type=number], .field input[type=time], .field select, .field textarea{
    width:100%; padding:8px 9px; border:1px solid var(--border); border-radius:7px; background:#fff; font-size:13px; font-family:inherit; color:var(--text);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid #4361EE33; border-color:#4361EE;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .days-check{display:flex; gap:6px; flex-wrap:wrap;}
  .days-check label{display:flex; align-items:center; gap:4px; font-size:12px; border:1px solid var(--border); border-radius:6px; padding:5px 8px; cursor:pointer; color:var(--text-soft);}
  .days-check input{margin:0;}
  .modal-actions{display:flex; justify-content:space-between; margin-top:18px; gap:10px;}
  .modal-actions .left{display:flex; gap:8px;}

  footer.filebar{
    position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border);
    padding:11px 28px; display:flex; justify-content:space-between; align-items:center; font-size:12.5px; color:var(--text-soft);
  }
  #importInput{display:none;}

  @media (max-width:900px){
    .meters{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:560px){
    .meters{grid-template-columns:1fr;}
    .masthead{flex-direction:column;}
    .stats{align-self:stretch;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="noSaveBanner" style="display:none;"></div>
  <div class="masthead">
    <div class="id">
      <h1 id="studentName">Anita Yan</h1>
      <div class="program" id="studentProgram">BFA Interactive Media Arts · Psychology Minor · NYU Tisch</div>
    </div>
    <div class="stats">
      <div class="stat-block">
        <div class="num"><span id="overallHave">0</span><small> / <span id="overallNeed">128</span> credits</small></div>
        <div class="label">Credits taken</div>
        <div class="overall-bar" id="overallBar" style="--c:var(--text)"></div>
        <div class="overall-extra" id="overallExtra"></div>
      </div>
      <div class="stat-block">
        <div class="num" id="semCount">0</div>
        <div class="label">Fall &amp; Spring semesters</div>
        <div class="sem-extra" id="semExtra"></div>
      </div>
    </div>
  </div>

  <div class="meters" id="meters"></div>

  <div class="toolbar">
    <div class="toggle-group">
      <button class="active" data-view="grid">Grid view</button>
      <button data-view="schedule">Schedule view</button>
    </div>
    <div class="actions-right">
      <button class="btn ghost" id="resetBtn">Reset to seeded plan</button>
    </div>
  </div>

  <div id="gridView">
    <div class="sem-grid" id="semGrid"></div>
  </div>

  <div id="scheduleView" style="display:none;">
    <div class="sched-controls">
      <label style="font-size:12px; color:var(--text-soft);">Semester:</label>
      <select id="schedTermSelect"></select>
    </div>
    <div id="schedContainer"></div>
  </div>
</div>

<footer class="filebar">
  <span id="saveStatus">Changes autosave in this browser.</span>
  <div style="display:flex; gap:8px;">
    <button class="btn ghost" id="exportBtn">Export JSON</button>
    <button class="btn ghost" id="importBtn">Import JSON</button>
    <input type="file" id="importInput" accept="application/json">
  </div>
</footer>

<div class="overlay" id="courseOverlay" style="display:none;">
  <div class="modal">
    <h2 id="courseModalTitle">Add course</h2>
    <form id="courseForm">
      <input type="hidden" id="courseId">
      <div class="field-row">
        <div class="field"><label>Course code</label><input type="text" id="f_code" placeholder="IMNY-UT 262"></div>
        <div class="field"><label>Credits</label><input type="number" id="f_credits" min="0" max="20" step="1" required></div>
      </div>
      <div class="field"><label>Course name</label><input type="text" id="f_name" list="courseNameList" required>
        <datalist id="courseNameList"></datalist>
      </div>

const STORAGE_KEY = 'gradPlannerState_v1';
const LAS_CORE_AREAS = ["Quantitative Reasoning","Physical or Life Science","Societies & the Social Sciences","Expressive Culture"];
function migrateState(parsed){
  // Older saves put LAS distribution areas under Electives — keep them under Core.
  if(Array.isArray(parsed.courses)){
    parsed.courses.forEach(course=>{
      if(course.category==='las_elective' && LAS_CORE_AREAS.includes(course.subcategory)){
        course.category = 'las_core';
      }
    });
  }
  // Fix J-Term / Summer terms that were saved with the wrong type.
  if(Array.isArray(parsed.terms)){
    parsed.terms.forEach(term=>{
      if(/j-?term/i.test(term.label||'')) term.type = 'jterm';
      else if(/^summer\b/i.test(term.label||'')) term.type = 'summer';
    });
  }
  return parsed;
}
function loadState(){
  try{
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && parsed.terms && parsed.courses && parsed.student) return migrateState(parsed);
    }
  }catch(err){ /* localStorage unavailable (e.g. sandboxed preview) — fall back to in-memory only */ }
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function persistState(){
  try{ window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); return true; }
  catch(err){ return false; }
}

let state = loadState();
let currentView = 'grid';
let draggedCourseId = null;
let draggedTermId = null;

const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function termCredits(termId){
  return state.courses.filter(c=>c.termId===termId).reduce((s,c)=>s+Number(c.credits||0),0);
}
function categoryEarned(catKey, opts){
  const excludeLasCoreAreas = opts && opts.excludeLasCoreAreas;
  return state.courses.filter(c=>{
    if(c.category!==catKey) return false;
    // Core's 12cr pool excludes the 4 distribution-area courses (shown separately under By area).
    if(excludeLasCoreAreas && catKey==='las_core' && LAS_CORE_AREAS.includes(c.subcategory)) return false;
    return true;
  }).reduce((acc,c)=>{
    if(c.status==='completed') acc.done += Number(c.credits||0);
    else if(c.status==='in-progress') acc.prog += Number(c.credits||0);
    else acc.plan += Number(c.credits||0);
    return acc;
  },{done:0,prog:0,plan:0});
}

function updateSaveStatus(saved){
  const el = document.getElementById('saveStatus');
  if(el) el.textContent = saved
    ? 'Changes autosave in this browser.'
    : 'Autosave unavailable here — use Export to keep your changes.';
  const banner = document.getElementById('noSaveBanner');
  if(!banner) return;
  if(saved){
    banner.style.display='none';
  } else {
    banner.style.display='block';
    banner.innerHTML = `<b>Heads up:</b> this preview can't save changes in your browser automatically (that's a restriction of viewing it inside Claude, not a problem with the file). Download the file and open it directly, or host it on GitHub Pages — autosave works normally there. Until then, click <b>Export JSON</b> below before you close this tab, and <b>Import JSON</b> to bring your data back next time.
      <div><button class="btn small" id="bannerExportBtn" type="button">Export now</button></div>`;
    const btn = document.getElementById('bannerExportBtn');
    if(btn) btn.addEventListener('click', ()=>document.getElementById('exportBtn').click());
  }
}

function termLabel(termId){
  const t = state.terms.find(x=>x.id===termId);
  return t ? t.label : '';
}
function termIndex(termId){
  return state.terms.findIndex(t=>t.id===termId);
}
function coursesInCategory(catKey){
  return state.courses
    .filter(c=>c.category===catKey)
    .slice()
    .sort((a,b)=>{
      const ti = termIndex(a.termId) - termIndex(b.termId);
      return ti !== 0 ? ti : String(a.name||'').localeCompare(String(b.name||''));
    });
}
function courseRowHtml(cs){
  const cat = CATEGORIES[cs.category];
  return `<div class="area-course" data-course="${cs.id}" title="Edit course" style="--c:${cat?cat.color:'#999'}">
    <div class="ac-name">${cs.name}${cs.code?` <span style="color:var(--text-faint)">(${cs.code})</span>`:''}</div>
    <div class="ac-meta">${termLabel(cs.termId) || 'No semester'} · ${cs.credits} cr</div>
  </div>`;
}
function escapeAttr(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;');
}
function addCourseBtnHtml(catKey, subcategory){
  const subAttr = subcategory ? ` data-add-subcategory="${escapeAttr(subcategory)}"` : '';
  const label = subcategory ? `+ Add course to ${escapeAttr(subcategory)}` : '+ Add course';
  return `<button type="button" class="area-add" data-add-course-cat="${escapeAttr(catKey)}"${subAttr}>${label}</button>`;
}
function chevronSmHtml(){
  return `<svg class="chevron-sm" width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M3 5.5L7 9.5L11 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function creditTotalLine(done, prog, plan){
  const total = done + prog + plan;
  const parts = [];
  if(prog) parts.push(prog+' in progress');
  if(plan) parts.push(plan+' planned');
  const detail = parts.length ? parts.join(' · ') + ' · ' : '';
  return detail + total + ' cr total';
}
function coursesEarned(courses){
  return courses.reduce((acc,c)=>{
    const n = Number(c.credits||0);
    if(c.status==='completed') acc.done += n;
    else if(c.status==='in-progress') acc.prog += n;
    else acc.plan += n;
    return acc;
  },{done:0,prog:0,plan:0});
}
function categoryCoursesHtml(catKey, wasOpen){
  const courses = coursesInCategory(catKey);
  const e = categoryEarned(catKey);
  const list = courses.length
    ? `<div class="area-course-list flush">${courses.map(courseRowHtml).join('')}${addCourseBtnHtml(catKey)}</div>`
    : `<div class="area-empty flush">No courses in this category yet.</div>${addCourseBtnHtml(catKey)}`;
  return `<details class="area-details" data-courses-cat="${catKey}" ${wasOpen?'open':''}>
    <summary>
      <span class="as-planned">${creditTotalLine(e.done, e.prog, e.plan)}</span>
      <span class="as-toggle">Courses ${chevronSmHtml()}</span>
    </summary>
    <div class="area-body">
      <div class="bp-sub">${courses.length} course${courses.length===1?'':'s'} — click to edit</div>
      ${list}
    </div>
  </details>`;
}

function areaSummaryRowHtml(catKey, wasOpen){
  const areas = SUBCATS[catKey];
  if(!areas) return '';
  const cat = CATEGORIES[catKey];
  const inAreas = state.courses.filter(c=>c.category===catKey && areas.includes(c.subcategory));
  const eAreas = coursesEarned(inAreas);
  const chevron = chevronSmHtml();
  const rows = areas.map(area=>{
    const matching = state.courses
      .filter(c=>c.category===catKey && c.subcategory===area)
      .slice()
      .sort((a,b)=>termIndex(a.termId)-termIndex(b.termId));
    const ae = coursesEarned(matching);
    const credits = ae.done + ae.prog + ae.plan;
    const pct = Math.min(100, credits/4*100);
    const ok = credits>=4;
    const courseCount = matching.length;
    const hint = courseCount
      ? `${creditTotalLine(ae.done, ae.prog, ae.plan)} · expand for courses`
      : '0 cr total — expand to add';
    const courseList = courseCount
      ? `<div class="area-course-list">${matching.map(courseRowHtml).join('')}${addCourseBtnHtml(catKey, area)}</div>`
      : `<div class="area-empty">Nothing assigned to this area yet.</div>${addCourseBtnHtml(catKey, area)}`;
    return `<details class="area-item">
      <summary>
        <div class="area-name">${area}<span class="area-hint">${hint}</span></div>
        <div class="area-track"><div class="area-track-fill" style="width:${pct}%; background:${cat.color};"></div></div>
        <div class="area-credits ${ok?'area-ok':'area-short'}">${credits}/4</div>
        ${chevron}
      </summary>
      ${courseList}
    </details>`;
  }).join('');
  return `<details class="area-details" data-cat="${catKey}" ${wasOpen?'open':''} style="--c:${cat.color}">
    <summary>
      <span class="as-planned">${creditTotalLine(eAreas.done, eAreas.prog, eAreas.plan)}</span>
      <span class="as-toggle">By area ${chevron}</span>
    </summary>
    <div class="area-body">
      <div class="bp-sub">Minimum 4 credits in each area — expand an area to see or add courses</div>
      ${rows}
    </div>
  </details>`;
}

function trackFillsHtml(done, prog, plan, needed){
  const pctDone = Math.min(100, needed?done/needed*100:0);
  const pctProg = Math.min(100-pctDone, needed?prog/needed*100:0);
  const pctPlan = Math.min(100-pctDone-pctProg, needed?plan/needed*100:0);
  return `
    <div class="m-fill" style="width:${pctDone}%"></div>
    <div class="m-fill inprog" style="width:${pctProg}%; left:${pctDone}%"></div>
    <div class="m-fill planned" style="width:${pctPlan}%; left:${pctDone+pctProg}%"></div>
  `;
}

function childMeterHtml(key, wasOpenArea, wasOpenCourses){
  const cat = CATEGORIES[key];
  const e = categoryEarned(key, {excludeLasCoreAreas: key==='las_core'});
  const hasAreas = !!SUBCATS[key];
  const dropdownHtml = hasAreas
    ? areaSummaryRowHtml(key, wasOpenArea)
    : categoryCoursesHtml(key, wasOpenCourses);
  return `<div class="child-meter" style="--c:${cat.color}">
    <div class="m-label"><span class="m-dot"></span>${cat.label}</div>
    <div class="m-nums"><span class="have">${e.done+e.prog}</span><span class="need">/ ${cat.needed} cr</span></div>
    <div class="m-track">
      ${trackFillsHtml(e.done, e.prog, e.plan, cat.needed)}
    </div>
    <div class="m-extra">${creditTotalLine(e.done, e.prog, e.plan)}</div>
    ${dropdownHtml}
  </div>`;
}

function renderMasthead(){
  document.getElementById('studentName').textContent = state.student.name;
  document.getElementById('studentProgram').innerHTML = state.student.program;
  let totalDone=0, totalProg=0, totalPlan=0;
  state.courses.forEach(c=>{
    if(c.status==='completed') totalDone+=Number(c.credits||0);
    else if(c.status==='in-progress') totalProg+=Number(c.credits||0);
    else totalPlan+=Number(c.credits||0);
  });
  const need = Object.values(CATEGORIES).reduce((s,x)=>s+x.needed,0);
  const totalAll = totalDone + totalProg + totalPlan;
  document.getElementById('overallHave').textContent = totalDone;
  document.getElementById('overallNeed').textContent = need;
  document.getElementById('overallBar').innerHTML = trackFillsHtml(totalDone, totalProg, totalPlan, need);
  const parts = [];
  if(totalProg) parts.push(totalProg+' in progress');
  if(totalPlan) parts.push(totalPlan+' planned');
  const detail = parts.length ? parts.join(' · ') + ' · ' : '';
  document.getElementById('overallExtra').textContent = detail + totalAll + ' cr total';

  const termsWithCourses = state.terms.filter(t=>state.courses.some(c=>c.termId===t.id));
  const isJterm = t => t.type==='jterm' || /j-?term/i.test(t.label||'');
  const isSummer = t => t.type==='summer' || /^summer\b/i.test(t.label||'');
  const fallSpring = termsWithCourses.filter(t=>!isJterm(t) && !isSummer(t) && (t.type==='fall'||t.type==='spring')).length;
  const summer = termsWithCourses.filter(isSummer).length;
  const jterm = termsWithCourses.filter(isJterm).length;
  document.getElementById('semCount').textContent = fallSpring;
  document.getElementById('semExtra').textContent =
    `${summer} summer · ${jterm} J-term session${summer+jterm===1?'':'s'}`;
}

function renderMeters(){
  const wrap = document.getElementById('meters');
  const wasOpenGroup = {};
  wrap.querySelectorAll('.req-tile[open]').forEach(d=>{ wasOpenGroup[d.dataset.group] = d.open; });
  const wasOpenArea = {};
  wrap.querySelectorAll('.area-details[data-cat]').forEach(d=>{ wasOpenArea[d.dataset.cat] = d.open; });
  const wasOpenCourses = {};
  wrap.querySelectorAll('.area-details[data-courses-cat]').forEach(d=>{ wasOpenCourses[d.dataset.coursesCat] = d.open; });
  wrap.innerHTML='';

  Object.entries(GROUPS).forEach(([gKey, group])=>{
    const needed = group.children.reduce((s,k)=>s+CATEGORIES[k].needed,0);
    let done=0, prog=0, plan=0;
    group.children.forEach(k=>{
      const e = categoryEarned(k);
      done+=e.done; prog+=e.prog; plan+=e.plan;
    });
    const have = done+prog;
    const details = document.createElement('details');
    details.className='req-tile';
    details.dataset.group = gKey;
    if(wasOpenGroup[gKey]) details.open = true;
    details.style.setProperty('--c', group.color);
    details.innerHTML = `
      <summary>
        <span class="g-dot"></span>
        <div class="g-info">
          <div class="g-label">${group.label}</div>
          <div class="g-sub">${group.children.map(k=>CATEGORIES[k].label).join(' · ')}</div>
          <div class="g-track">${trackFillsHtml(done, prog, plan, needed)}</div>
          <div class="g-planned">${creditTotalLine(done, prog, plan)}</div>
        </div>
        <div class="g-nums">${have}<small> / ${needed} cr</small></div>
        <svg class="chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5.5L7 9.5L11 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </summary>
      <div class="group-body">
        ${group.children.map(k=>childMeterHtml(k, wasOpenArea[k], wasOpenCourses[k])).join('')}
      </div>
    `;
    wrap.appendChild(details);
  });

  // Free Electives — expand the tile itself to list courses (no subcategories)
  const catKey = 'free_elective';
  const cat = CATEGORIES[catKey];
  const e = categoryEarned(catKey);
  const needed = cat.needed;
  const have = e.done+e.prog;
  const freeCourses = coursesInCategory(catKey);
  const freeList = freeCourses.length
    ? freeCourses.map(courseRowHtml).join('') + addCourseBtnHtml(catKey)
    : `<div class="area-empty flush">No free electives yet.</div>${addCourseBtnHtml(catKey)}`;
  const standalone = document.createElement('details');
  standalone.className = 'req-tile';
  standalone.dataset.group = 'free';
  if(wasOpenGroup.free) standalone.open = true;
  standalone.style.setProperty('--c', cat.color);
  standalone.innerHTML = `
    <summary>
      <span class="g-dot"></span>
      <div class="g-info">
        <div class="g-label">${cat.label}</div>
        <div class="g-sub">General credits from any department</div>
        <div class="g-track">${trackFillsHtml(e.done, e.prog, e.plan, needed)}</div>
        <div class="g-planned">${creditTotalLine(e.done, e.prog, e.plan)}</div>
      </div>
      <div class="g-nums">${have}<small> / ${needed} cr</small></div>
      <svg class="chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5.5L7 9.5L11 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </summary>
    <div class="group-body">
      <div class="bp-sub" style="margin:0 0 8px; padding:0; border:none;">${freeCourses.length} course${freeCourses.length===1?'':'s'} — click to edit</div>
      ${freeList}
    </div>
  `;
  wrap.appendChild(standalone);
}

function statusBadge(course){
  if(course.status==='completed') return 'Done';
  if(course.status==='in-progress') return 'In progress';
  return 'Planned';
}

function reorderTerm(fromId, toId){
  if(!fromId || !toId || fromId===toId) return false;
  const fromIdx = state.terms.findIndex(t=>t.id===fromId);
  if(fromIdx<0) return false;
  const [moved] = state.terms.splice(fromIdx, 1);
  const toIdx = state.terms.findIndex(t=>t.id===toId);
  if(toIdx<0){
    state.terms.splice(fromIdx, 0, moved);
    return false;
  }
  state.terms.splice(toIdx, 0, moved);
  return true;
}

function moveCourse(courseId, targetTermId, beforeCourseId){
  const fromIdx = state.courses.findIndex(c=>c.id===courseId);
  if(fromIdx<0) return false;
  const [moved] = state.courses.splice(fromIdx, 1);
  moved.termId = targetTermId;
  if(beforeCourseId && beforeCourseId!==courseId){
    const toIdx = state.courses.findIndex(c=>c.id===beforeCourseId);
    if(toIdx>=0){
      state.courses.splice(toIdx, 0, moved);
      return true;
    }
  }
  let lastIdx = -1;
  for(let i=0;i<state.courses.length;i++){
    if(state.courses[i].termId===targetTermId) lastIdx = i;
  }
  state.courses.splice(lastIdx+1, 0, moved);
  return true;
}

function clearCourseDropStyles(){
  document.querySelectorAll('.course-row').forEach(r=>{
    r.classList.remove('drop-before', 'drop-after');
  });
}

function clearTermDragStyles(){
  document.querySelectorAll('.sem-card').forEach(c=>{
    c.classList.remove('drag-over', 'term-drag-over', 'term-dragging');
  });
  clearCourseDropStyles();
}

function attachDragHandlers(){
  document.querySelectorAll('.course-row').forEach(row=>{
    row.addEventListener('dragstart', e=>{
      draggedCourseId = row.dataset.course;
      draggedTermId = null;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', row.dataset.course);
      e.dataTransfer.setData('application/x-drag-kind', 'course');
    });
    row.addEventListener('dragend', ()=>{
      row.classList.remove('dragging');
      draggedCourseId = null;
      clearTermDragStyles();
    });
    row.addEventListener('dragover', e=>{
      if(!draggedCourseId || draggedTermId) return;
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      const rect = row.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height/2;
      row.classList.toggle('drop-before', before);
      row.classList.toggle('drop-after', !before);
      document.querySelectorAll('.course-row').forEach(r=>{
        if(r!==row) r.classList.remove('drop-before', 'drop-after');
      });
      const card = row.closest('.sem-card');
      if(card) card.classList.add('drag-over');
    });
    row.addEventListener('dragleave', e=>{
      if(row.contains(e.relatedTarget)) return;
      row.classList.remove('drop-before', 'drop-after');
    });
    row.addEventListener('drop', e=>{
      if(!draggedCourseId && e.dataTransfer.getData('application/x-drag-kind')!=='course') return;
      e.preventDefault();
      e.stopPropagation();
      const courseId = draggedCourseId || e.dataTransfer.getData('text/plain');
      const targetTermId = row.closest('.sem-card')?.dataset.term;
      const rect = row.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height/2;
      let beforeCourseId = null;
      if(before){
        beforeCourseId = row.dataset.course;
      } else {
        const next = row.nextElementSibling;
        beforeCourseId = next && next.classList.contains('course-row') ? next.dataset.course : null;
      }
      clearTermDragStyles();
      if(courseId && targetTermId && courseId!==beforeCourseId){
        if(moveCourse(courseId, targetTermId, beforeCourseId)) render();
      }
      draggedCourseId = null;
    });
  });
  document.querySelectorAll('.sem-card').forEach(card=>{
    const head = card.querySelector('.sem-head');
    head.addEventListener('dragstart', e=>{
      if(e.target.closest('.sem-remove, .sem-toggle, .sem-edit, .sem-title-btn')){
        e.preventDefault();
        return;
      }
      draggedTermId = card.dataset.term;
      draggedCourseId = null;
      card.classList.add('term-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.term);
      e.dataTransfer.setData('application/x-drag-kind', 'term');
    });
    head.addEventListener('dragend', ()=>{
      draggedTermId = null;
      clearTermDragStyles();
    });
    card.addEventListener('dragover', e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(draggedTermId){
        if(draggedTermId !== card.dataset.term) card.classList.add('term-drag-over');
        card.classList.remove('drag-over');
      } else {
        card.classList.add('drag-over');
        card.classList.remove('term-drag-over');
      }
    });
    card.addEventListener('dragleave', e=>{
      if(card.contains(e.relatedTarget)) return;
      card.classList.remove('drag-over', 'term-drag-over');
    });
    card.addEventListener('drop', e=>{
      e.preventDefault();
      const targetTermId = card.dataset.term;
      const kind = e.dataTransfer.getData('application/x-drag-kind');
      const isTermDrag = draggedTermId || kind === 'term';
      clearTermDragStyles();
      if(isTermDrag){
        const fromId = draggedTermId || e.dataTransfer.getData('text/plain');
        if(reorderTerm(fromId, targetTermId)) render();
        draggedTermId = null;
        return;
      }
      const courseId = draggedCourseId || e.dataTransfer.getData('text/plain');
      if(courseId && targetTermId){
        if(moveCourse(courseId, targetTermId, null)) render();
      }
      draggedCourseId = null;
    });
  });
}

function renderSchedTermOptions(){
  const sel = document.getElementById('schedTermSelect');
  const prev = sel.value;
  sel.innerHTML = state.terms.map(t=>`<option value="${t.id}">${t.label}</option>`).join('');
  if(prev && state.terms.some(t=>t.id===prev)) sel.value = prev;
}

function timeToRow(t){
  if(!t) return null;
  const [h,m] = t.split(':').map(Number);
  return (h*60+m);
}

function renderSchedule(){
  const termId = document.getElementById('schedTermSelect').value;
  const container = document.getElementById('schedContainer');
  const courses = state.courses.filter(c=>c.termId===termId && c.days && c.days.length && c.start && c.end);
  if(!courses.length){
    container.innerHTML = `<div class="no-schedule-note">No timed courses yet for this semester. Add meeting days/times when editing a course to see it here.</div>`;
    return;
  }
  // Compact weekday window: at least 8am–5pm, extends for night classes (up to 9pm)
  const startHour = 8;
  let endHour = 17;
  courses.forEach(cs=>{
    const endM = timeToRow(cs.end);
    if(endM != null) endHour = Math.max(endHour, Math.ceil(endM / 60));
  });
  endHour = Math.min(21, endHour); // cap at 9pm
  const weekDays = ["Mon","Tue","Wed","Thu","Fri"];
  const totalMin = (endHour-startHour)*60;
  // Keep the day grid roughly one-screen tall even when evenings are included
  const pxPerMin = Math.min(0.85, 420 / totalMin);
  let hourRows = '';
  for(let h=startHour; h<endHour; h++){
    const label = h>12?(h-12)+'pm':(h===12?'12pm':h+'am');
    hourRows += `<div class="tcell" style="height:${60*pxPerMin}px;">${label}</div>`;
  }
  let cols = '';
  weekDays.forEach(day=>{
    const dayCourses = courses.filter(c=>c.days.includes(day));
    let blocks = '';
    dayCourses.forEach(cs=>{
      const cat = CATEGORIES[cs.category];
      const sM = timeToRow(cs.start) - startHour*60;
      const eM = timeToRow(cs.end) - startHour*60;
      if(eM <= 0 || sM >= totalMin) return; // outside visible window
      const top = Math.max(0,sM)*pxPerMin;
      const bottom = Math.min(totalMin, eM)*pxPerMin;
      const height = Math.max(14, bottom - top);
      blocks += `<div class="sched-block" style="--c:${cat?cat.color:'#999'}; top:${top}px; height:${height}px;" data-course="${cs.id}" title="${cs.name} (${cs.start}–${cs.end})">
        <div class="b-name">${cs.name}</div>
        <div class="b-code">${cs.start}–${cs.end}</div>
      </div>`;
    });
    cols += `<div class="sched-col" style="height:${totalMin*pxPerMin}px;">${blocks}</div>`;
  });
  container.innerHTML = `
    <div class="sched-grid" style="grid-template-rows:24px 1fr;">
      <div class="hcell"></div>
      ${weekDays.map(d=>`<div class="hcell">${d}</div>`).join('')}
      <div>${hourRows}</div>
      ${cols}
    </div>
  `;
  container.querySelectorAll('[data-course]').forEach(el=>{
    el.addEventListener('click', ()=>openCourseModal(el.dataset.course));
  });
}

const overlay = document.getElementById('courseOverlay');
const form = document.getElementById('courseForm');

function categoryFullLabel(key){
  const group = Object.values(GROUPS).find(g=>g.children.includes(key));
  const base = CATEGORIES[key].label;
  return group ? `${group.label} — ${base}` : base;
}
function populateCategorySelect(){
  const sel = document.getElementById('f_category');
  sel.innerHTML = Object.keys(CATEGORIES).map(k=>`<option value="${k}">${categoryFullLabel(k)}</option>`).join('');
}
function populateTermSelect(){
  const sel = document.getElementById('f_term');
  sel.innerHTML = state.terms.map(t=>`<option value="${t.id}">${t.label}</option>`).join('');
}
function populateDaysCheck(selectedDays){
  const wrap = document.getElementById('daysCheck');
  wrap.innerHTML = DAYS.map(d=>`<label><input type="checkbox" value="${d}" ${selectedDays&&selectedDays.includes(d)?'checked':''}> ${d}</label>`).join('');
}

function refreshSubcategoryField(selectedSubcat){
  const catKey = document.getElementById('f_category').value;
  const wrap = document.getElementById('f_subcategory_wrap');
  const sel = document.getElementById('f_subcategory');
  const areas = SUBCATS[catKey];
  if(areas){
    wrap.style.display='block';
    sel.innerHTML = '<option value="">General / other</option>' + areas.map(a=>`<option value="${a}">${a}</option>`).join('');
    sel.value = selectedSubcat || '';
  } else {
    wrap.style.display='none';
    sel.innerHTML = '';
  }
  refreshCourseNameSuggestions();
}
function refreshCourseNameSuggestions(){
  const subcat = document.getElementById('f_subcategory').value;
  const list = document.getElementById('courseNameList');
  const options = COURSE_CATALOG[subcat] || [];
  list.innerHTML = options.map(o=>`<option value="${o}">`).join('');
}
document.getElementById('f_category').addEventListener('change', ()=>refreshSubcategoryField());
document.getElementById('f_subcategory').addEventListener('change', refreshCourseNameSuggestions);

function openCourseModal(courseId, defaultTermId, defaults){
  populateCategorySelect();
  populateTermSelect();
  const course = courseId ? state.courses.find(c=>c.id===courseId) : null;
  const preset = defaults || {};
  document.getElementById('courseModalTitle').textContent = course ? 'Edit course' : 'Add course';
  document.getElementById('courseId').value = course ? course.id : '';
  document.getElementById('f_code').value = course ? course.code||'' : '';
  document.getElementById('f_name').value = course ? course.name||'' : '';
  document.getElementById('f_credits').value = course ? course.credits : 4;
  document.getElementById('f_category').value = course ? course.category : (preset.category || 'ima_elective');
  document.getElementById('f_term').value = course ? course.termId : (defaultTermId || preset.termId || state.terms[0].id);
  document.getElementById('f_status').value = course ? course.status : 'planned';
  refreshSubcategoryField(course ? course.subcategory : (preset.subcategory || ''));
  populateDaysCheck(course ? course.days : []);
  document.getElementById('f_start').value = course && course.start ? course.start : '';
  document.getElementById('f_end').value = course && course.end ? course.end : '';
  document.getElementById('f_notes').value = course && course.notes ? course.notes : '';
  document.getElementById('deleteCourseBtn').style.display = course ? 'inline-block' : 'none';
  overlay.style.display='flex';
}
function closeCourseModal(){ overlay.style.display='none'; }

form.addEventListener('submit', e=>{
  e.preventDefault();
  const id = document.getElementById('courseId').value;
  const days = Array.from(document.querySelectorAll('#daysCheck input:checked')).map(i=>i.value);
  const data = {
    code: document.getElementById('f_code').value.trim(),
    name: document.getElementById('f_name').value.trim(),
    credits: Number(document.getElementById('f_credits').value)||0,
    category: document.getElementById('f_category').value,
    subcategory: SUBCATS[document.getElementById('f_category').value] ? document.getElementById('f_subcategory').value : '',
    termId: document.getElementById('f_term').value,
    status: document.getElementById('f_status').value,
    days: days,
    start: document.getElementById('f_start').value,
    end: document.getElementById('f_end').value,
    notes: document.getElementById('f_notes').value.trim()
  };
  if(id){
    const idx = state.courses.findIndex(c=>c.id===id);
    state.courses[idx] = {...state.courses[idx], ...data};
  } else {
    state.courses.push({id:c(), ...data});
  }
  closeCourseModal();
  render();
});
document.getElementById('cancelCourseBtn').addEventListener('click', closeCourseModal);
document.getElementById('deleteCourseBtn').addEventListener('click', ()=>{
  const id = document.getElementById('courseId').value;
  if(id && confirm('Delete this course?')){
    state.courses = state.courses.filter(c=>c.id!==id);
    closeCourseModal();
    render();
  }
});

/* ---------------- TERM MODAL ---------------- */
const termOverlay = document.getElementById('termOverlay');
document.getElementById('termForm').addEventListener('submit', e=>{
  e.preventDefault();
  const id = document.getElementById('termId').value;
  const label = document.getElementById('t_label').value.trim();
  const type = document.getElementById('t_type').value;
  if(!label) return;
  if(id){
    const term = state.terms.find(t=>t.id===id);
    if(term){
      term.label = label;
      term.type = type;
    }
  } else {
    state.terms.push({id:c(), label, type});
  }
  closeTermModal();
  render();
});
document.getElementById('cancelTermBtn').addEventListener('click', closeTermModal);
document.getElementById('deleteTermBtn').addEventListener('click', ()=>{
  const id = document.getElementById('termId').value;
  if(!id) return;
  const hasCourses = state.courses.some(c=>c.termId===id);
  const msg = hasCourses ? 'This semester has courses in it. Remove it and all its courses?' : 'Remove this semester?';
  if(confirm(msg)){
    state.courses = state.courses.filter(c=>c.termId!==id);
    state.terms = state.terms.filter(t=>t.id!==id);
    closeTermModal();
    render();
  }
});
function openTermModal(termId){
  const term = termId ? state.terms.find(t=>t.id===termId) : null;
  document.getElementById('termModalTitle').textContent = term ? 'Edit semester / session' : 'Add semester / session';
  document.getElementById('termId').value = term ? term.id : '';
  document.getElementById('t_label').value = term ? term.label : '';
  document.getElementById('t_type').value = term ? term.type : 'fall';
  document.getElementById('termSaveBtn').textContent = term ? 'Save' : 'Add';
  document.getElementById('deleteTermBtn').style.display = term ? 'inline-block' : 'none';
  termOverlay.style.display='flex';
}
function closeTermModal(){ termOverlay.style.display='none'; }

/* ---------------- DELEGATED CLICKS ---------------- */
document.getElementById('semGrid').addEventListener('click', e=>{
  const toggleBtn = e.target.closest('[data-toggle-term]');
  if(toggleBtn){
    const term = state.terms.find(t=>t.id===toggleBtn.dataset.toggleTerm);
    if(term){
      term.collapsed = !term.collapsed;
      render();
    }
    return;
  }
  const editTermBtn = e.target.closest('[data-edit-term]');
  if(editTermBtn){ openTermModal(editTermBtn.dataset.editTerm); return; }
  const addBtn = e.target.closest('[data-add-course]');
  if(addBtn){ openCourseModal(null, addBtn.dataset.addCourse); return; }
  const removeBtn = e.target.closest('[data-remove-term]');
  if(removeBtn){
    const termId = removeBtn.dataset.removeTerm;
    const hasCourses = state.courses.some(c=>c.termId===termId);
    const msg = hasCourses ? 'This semester has courses in it. Remove it and all its courses?' : 'Remove this semester?';
    if(confirm(msg)){
      state.courses = state.courses.filter(c=>c.termId!==termId);
      state.terms = state.terms.filter(t=>t.id!==termId);
      render();
    }
    return;
  }
  const row = e.target.closest('[data-course]');
  if(row){ openCourseModal(row.dataset.course); return; }
  if(e.target.id==='addSemCard'){ openTermModal(); return; }
});

document.getElementById('meters').addEventListener('click', e=>{
  const addBtn = e.target.closest('[data-add-course-cat]');
  if(addBtn){
    e.preventDefault();
    e.stopPropagation();
    openCourseModal(null, null, {
      category: addBtn.dataset.addCourseCat,
      subcategory: addBtn.dataset.addSubcategory || ''
    });
    return;
  }
  const courseEl = e.target.closest('.area-course[data-course]');
  if(courseEl){
    e.preventDefault();
    openCourseModal(courseEl.dataset.course);
  }
});

/* ---------------- VIEW TOGGLE ---------------- */
document.querySelectorAll('.toggle-group button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.toggle-group button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('gridView').style.display = currentView==='grid' ? 'block':'none';
    document.getElementById('scheduleView').style.display = currentView==='schedule' ? 'block':'none';
    if(currentView==='schedule') renderSchedule();
  });
});
document.getElementById('schedTermSelect').addEventListener('change', renderSchedule);
/* ---------------- EXPORT / IMPORT ---------------- */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'graduation-plan.json';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('importBtn').addEventListener('click', ()=>{
  document.getElementById('importInput').click();
});
document.getElementById('importInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    try{
      const parsed = JSON.parse(evt.target.result);
      if(parsed.terms && parsed.courses && parsed.student){
        state = migrateState(parsed);
        render();
      } else {
        alert('This file does not look like a graduation-plan export.');
      }
    }catch(err){
      alert('Could not read that file: '+err.message);
    }
  };
  reader.readAsText(file);
  e.target.value='';
});
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('Reset to the originally seeded plan? Any manual edits will be lost (export first if you want to keep them).')){
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    render();
  }
});

render();
</script>
</body>
</html>
